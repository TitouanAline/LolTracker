<div class="app">
  <div class="container">
    <div class="card">
      <h1>Friend Tracker</h1>

      <!-- LOADING -->
      <div *ngIf="loading()">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>

      <!-- ERROR -->
      <div *ngIf="!loading() && error()">
        <p class="error">{{ error() }}</p>
      </div>

      <div class="friends-scroll">
        <app-game-preview *ngFor="let f of friends()" [data]="f"></app-game-preview>
      </div>
    </div>
  </div>
</div>
