<div class="app">
  <div class="container">
    <h1>LOL Tracker</h1>

    <div class="search-box">
      <input [ngModel]="name()" (ngModelChange)="name.set($event)" placeholder="Game Name" />
      <input [ngModel]="tag()" (ngModelChange)="tag.set($event)" placeholder="Tag (EUW...)" />
      <button (click)="search()">Search</button>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading()" class="center-block">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>

    <!-- ERROR -->
    <div *ngIf="!loading() && error()" class="center-block">
      <p class="error">{{ error() }}</p>
    </div>

    <!-- RESULT -->
    <app-game-preview
      *ngIf="!loading() && result() as result"
      [data]="result"
      (clicked)="goToDetail($event)"
    ></app-game-preview>

    <!-- ✅ Nouveau bouton -->
    <button *ngIf="result()" class="save-btn" (click)="toggleFriend(validName, validTag)">
      {{ isFriend() ? 'Remove Friend' : 'Add Friend' }}
    </button>
  </div>
</div>
